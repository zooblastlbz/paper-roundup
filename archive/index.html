<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Paper Roundup Archive</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .archive-list {
            list-style: none;
        }
        .archive-item {
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .archive-item:last-child {
            border-bottom: none;
        }
        .archive-date {
            font-size: 0.9rem;
            color: #7f8c8d;
            min-width: 100px;
        }
        .archive-link {
            flex: 1;
        }
        .archive-link a {
            color: #2c3e50;
            text-decoration: none;
            font-weight: 500;
        }
        .archive-link a:hover {
            color: #667eea;
        }
        .back-link {
            text-align: center;
            margin-top: 30px;
        }
        .back-link a {
            color: white;
            text-decoration: none;
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 25px;
            display: inline-block;
        }
        .back-link a:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 论文归档</h1>
            <p>历史 Daily Paper Roundup 集合</p>
        </div>
        <div class="card">
            <ul class="archive-list">
                
        <li class="archive-item">
            <span class="archive-date">2026年05月13日</span>
            <span class="archive-link"><a href="2026-05-13.html">2026-05-13</a></span>
        </li>
        
            </ul>
        </div>
        <div class="back-link">
            <a href="../daily/index.html">⬅️ 返回最新</a>
        </div>
    </div>
</body>
</html>
